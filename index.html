<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Chaturbate Cams • Real-Time Directory (Free)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { background: #111; color: #fff; } .card { transition: all 0.3s; } .card:hover { transform: scale(1.05); }</style>
</head>
<body class="min-h-screen p-4">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-2">🔴 LIVE CHATURBATE CAMS</h1>
    <p class="text-center text-pink-400 mb-8">Geo-targeted • Updated every second • 18+ only</p>
    
    <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="w-full max-w-4xl p-4">
      <button onclick="closeModal()" class="absolute top-4 right-4 text-white text-3xl">✕</button>
      <div id="iframe-container"></div>
    </div>
  </div>

  <script>
    const WM = "E8bhk"; // your affiliate code
    const API = `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=T2CSW&client_ip=request_ip&format=json&limit=50&gender=f&hd=true`;

    async function loadRooms() {
      const res = await fetch(API);
      const data = await res.json();
      
      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      data.results.sort((a,b) => b.num_users - a.num_users); // hottest first

      data.results.forEach(room => {
        const card = document.createElement("div");
        card.className = "card bg-zinc-900 rounded-xl overflow-hidden cursor-pointer";
        card.innerHTML = `
          <img src="${room.image_url_360x270}" class="w-full h-48 object-cover">
          <div class="p-3">
            <div class="flex justify-between items-start">
              <div>
                <div class="font-bold text-lg">${room.username}</div>
                <div class="text-xs text-pink-400">${room.room_subject}</div>
              </div>
              <div class="text-right">
                <div class="text-emerald-400 text-sm">${room.num_users} watching</div>
                <div class="text-xs text-gray-400">${room.age} • ${room.location}</div>
              </div>
            </div>
            <button onclick="openRoom('${room.iframe_embed_revshare}')" 
                    class="mt-3 w-full bg-pink-600 hover:bg-pink-500 py-2 rounded-lg font-bold">
              WATCH LIVE FREE
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function openRoom(html) {
      document.getElementById("iframe-container").innerHTML = html;
      document.getElementById("modal").classList.remove("hidden");
    }
    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
      document.getElementById("iframe-container").innerHTML = "";
    }

    // Load on page open
    loadRooms();
    
    // Refresh every 90 seconds so rooms stay fresh
    setInterval(loadRooms, 90000);
  </script>
</body>
</html>
